name: Build and push Docker images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:           ghcr.io
  FRANKENPHP_VERSION: 1.12.2

jobs:
  # ── php base ────────────────────────────────────────────────────────────────
  php-base:
    name: php-${{ matrix.php_minor }}-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: "7.4.33"
            php_minor:   "7.4"
            distro: bullseye
          - php_version: "8.5.5"
            php_minor:   "8.5"
            distro: trixie
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: php/Dockerfile
          target: base
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/php:${{ matrix.php_minor }}-base
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/php:${{ matrix.php_version }}-base
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/php:${{ matrix.php_minor }}-base-${{ github.sha }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            DISTRO=${{ matrix.distro }}
          # Cache scopes use minor version so a patch bump doesn't bust the cache.
          cache-from: type=gha,scope=php-${{ matrix.php_minor }}-base
          cache-to: type=gha,scope=php-${{ matrix.php_minor }}-base,mode=max

  # ── php ci ──────────────────────────────────────────────────────────────────
  php-ci:
    name: php-7.4-ci
    runs-on: ubuntu-latest
    needs: php-base
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: php/Dockerfile
          target: ci
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/php:7.4-ci
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/php:7.4.33-ci
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/php:7.4-ci-${{ github.sha }}
          build-args: |
            PHP_VERSION=7.4.33
            DISTRO=bullseye
          # Pull base-layer cache so the ci stage doesn't rebuild from scratch.
          cache-from: |
            type=gha,scope=php-7.4-base
            type=gha,scope=php-7.4-ci
          cache-to: type=gha,scope=php-7.4-ci,mode=max

  # ── frankenphp base ─────────────────────────────────────────────────────────
  frankenphp-base:
    name: frankenphp-8.5-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frankenphp/Dockerfile
          target: base
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frankenphp:8.5-base
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frankenphp:8.5.5-base
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frankenphp:8.5-base-${{ github.sha }}
          build-args: |
            FRANKENPHP_VERSION=${{ env.FRANKENPHP_VERSION }}
            PHP_VERSION=8.5.5
            DISTRO=trixie
          cache-from: type=gha,scope=frankenphp-8.5-base
          cache-to: type=gha,scope=frankenphp-8.5-base,mode=max
